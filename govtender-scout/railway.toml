[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Environment variables (set these in Railway UI)
# DATABASE_URL - provided by Railway PostgreSQL plugin
# REDIS_URL - provided by Railway Redis plugin
# ANTHROPIC_API_KEY
# RESEND_API_KEY
# WATI_API_URL
# WATI_TOKEN
# RZP_KEY_ID
# RZP_KEY_SECRET
# RZP_WEBHOOK_SECRET
# RZP_PLAN_BASIC
# RZP_PLAN_PRO
# RZP_PLAN_AGENCY
# PROXY_USER
# PROXY_PASS
# R2_ENDPOINT
# R2_KEY
# R2_SECRET
# R2_BUCKET
# SUPABASE_URL
# SUPABASE_ANON_KEY
